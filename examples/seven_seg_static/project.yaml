version: 2
kind: project

project:
  name: seven_seg_static
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen
  debug: true

timing:
  file: timing_config.yaml

registries:
  packs: []
  ip:
    - ip

features:
  use:
    - board:onboard.seg
    - board:onboard.dig

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK
    frequency_hz: 50000000
  generated: []

modules:
  # Statický displej — digits_i a dots_i sú nezapojené, framework ich tie-offuje
  # na 0 so správnou šírkou (NUM_DIGITS*4 = 12 bitov pre digits_i).
  # Displej zobrazuje "000" so zhasnutými bodkami.
  - instance: seg_mux0
    type: seven_seg_mux
    clocks:
      clk_i: sys_clk
    params:
      CLOCK_FREQ_HZ: 50000000
      NUM_DIGITS: 3
      DIGIT_REFRESH_HZ: 500
      COMMON_ANODE: 1
    bind:
      ports:
        digit_sel_o:
          target: board:onboard.dig
        segment_sel_o:
          target: board:onboard.seg

artifacts:
  emit: [rtl, board, timing]
