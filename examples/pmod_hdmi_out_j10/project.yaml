version: 2
kind: project

project:
  name: pmod_hdmi_out_j10
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen

registries:
  packs:
    - ../../packs/builtin
  ip:
    - ip

features:
  use:
    - board:external.pmod.j10_hdmi_out.signals.clk
    - board:external.pmod.j10_hdmi_out.signals.de
    - board:external.pmod.j10_hdmi_out.signals.hsync
    - board:external.pmod.j10_hdmi_out.signals.vsync
    - board:external.pmod.j10_hdmi_out.signals.d

timing:
  file: timing.yaml

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: hdmi_out0
    type: hdmi_out
    clocks:
      PIXEL_CLK: sys_clk
    bind:
      ports:
        HDMI_CLK:
          target: board:external.pmod.j10_hdmi_out.signals.clk
        HDMI_DE:
          target: board:external.pmod.j10_hdmi_out.signals.de
        HDMI_HSYNC:
          target: board:external.pmod.j10_hdmi_out.signals.hsync
        HDMI_VSYNC:
          target: board:external.pmod.j10_hdmi_out.signals.vsync
        HDMI_D:
          target: board:external.pmod.j10_hdmi_out.signals.d

artifacts:
  emit: [rtl, board, timing]
