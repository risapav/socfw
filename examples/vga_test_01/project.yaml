version: 2
kind: project

project:
  name: vga_test_01
  mode: standalone
  board: qmtech_ep4ce55

registries:
  packs:
    - ../../packs/builtin
  ip:
    - ip
    - cores/clkpll

timing:
  file: timing_config.yaml

clocks:
  primary:
    domain: sys_clk
    source: board:sys_clk
  generated:
    - domain: clk_pixel
      source:
        instance: clkpll
        output: c0
      frequency_hz: 75000000
      reset:
        sync_from: sys_clk
        sync_stages: 2

features:
  use:
    - board:onboard.seg
    - board:onboard.dig
    - board:onboard.vga.vga_r
    - board:onboard.vga.vga_g
    - board:onboard.vga.vga_b
    - board:onboard.vga.vga_hsync
    - board:onboard.vga.vga_vsync

modules:
  - instance: clkpll
    type: clkpll
    clocks:
      inclk0:
        domain: sys_clk
        no_reset: true

  - instance: vga_ctrl0
    type: vga_ctrl
    clocks:
      clk_i: clk_pixel
    params:
      BLANKING_COLOR: "16'h0000"
      UNDERRUN_COLOR: "16'hF81F"
      MAX_COUNTER_H: 1024
      MAX_COUNTER_V: 768
    bind:
      ports:
        vga_r_o:
          target: board:onboard.vga.vga_r
        vga_g_o:
          target: board:onboard.vga.vga_g
        vga_b_o:
          target: board:onboard.vga.vga_b
        vga_hs_o:
          target: board:onboard.vga.vga_hsync
        vga_vs_o:
          target: board:onboard.vga.vga_vsync

  - instance: vga_pixel_xy0
    type: vga_pixel_xy
    clocks:
      clk_i: clk_pixel
    params:
      MAX_COUNTER_H: 1024
      MAX_COUNTER_V: 768

  - instance: picture_gen0
    type: picture_gen
    clocks:
      clk_i: clk_pixel
    params:
      H_RES: 1024
      V_RES: 768

  - instance: mode_gen0
    type: mode_gen
    clocks:
      clk_i: sys_clk
    params:
      CLOCK_FREQ_HZ: 50000000
      NUM_DIGITS: 3
      CHANGE_PERIOD_MS: 2000

  - instance: seven_seg_mux0
    type: seven_seg_mux
    clocks:
      clk_i: sys_clk
    params:
      CLOCK_FREQ_HZ: 50000000
      NUM_DIGITS: 3
      DIGIT_REFRESH_HZ: 250
      COMMON_ANODE: 0
    bind:
      ports:
        digit_sel_o:
          target: board:onboard.dig
        segment_sel_o:
          target: board:onboard.seg

# Prepojenia medzi modulmi
# enable_i všetkých VGA modulov je riadené PLL locked signálom —
# VGA štartuje až po ustálení PLL (eliminuje glitche pri spúšťaní)
connections:
  - from: clkpll.locked
    to: vga_ctrl0.enable_i
  - from: clkpll.locked
    to: vga_pixel_xy0.enable_i
  - from: clkpll.locked
    to: picture_gen0.enable_i

  # Koniec riadku / snímky: vga_ctrl → pixel XY počítadlo
  - from: vga_ctrl0.eol_o
    to: vga_pixel_xy0.eol_i
  - from: vga_ctrl0.eof_o
    to: vga_pixel_xy0.eof_i

  # Súradnice pixelu: pixel XY → generátor obrazcov
  - from: vga_pixel_xy0.x_o
    to: picture_gen0.x_i
  - from: vga_pixel_xy0.y_o
    to: picture_gen0.y_i

  # Data enable: vga_ctrl → generátor obrazcov (HDE = aktívny riadok)
  - from: vga_ctrl0.hde_o
    to: picture_gen0.de_i

  # Dátový tok pixelov: generátor → VGA radič (bez FIFO, priamo)
  - from: picture_gen0.data_o
    to: vga_ctrl0.fifo_data_i

  # Automatický mód: mode_gen → picture_gen (výber vzoru) + seven_seg_mux (zobrazenie)
  - from: mode_gen0.mode_o
    to: picture_gen0.mode_i
  - from: mode_gen0.digits_o
    to: seven_seg_mux0.digits_i
  - from: mode_gen0.dots_o
    to: seven_seg_mux0.dots_i

