version: 2
kind: ip

ip:
  name: seven_seg_mux
  module: seven_seg_mux
  category: peripheral

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: rst_ni
  active_high: false

clocking:
  primary_input_port: clk_i
  additional_input_ports: []
  outputs: []

parameters:
  - name: CLOCK_FREQ_HZ
    type: int
    default: 50000000
  - name: NUM_DIGITS
    type: int
    default: 3
  - name: DIGIT_REFRESH_HZ
    type: int
    default: 250
  - name: COMMON_ANODE
    type: bit
    default: false

# POZOR: digits_i [NUM_DIGITS] a dots_i [NUM_DIGITS] sú UNPACKED ARRAYS.
# Framework ich nevie automaticky napojiť — po generovaní ručne doplni do soc_top.sv:
#   .digits_i('{ 4'h0, 4'h0, 4'h0 }),
#   .dots_i('{ 0, 0, 0 })

ports:
  - name: clk_i
    direction: input
    width: 1
  - name: rst_ni
    direction: input
    width: 1
  - name: digit_sel_o
    direction: output
    width_expr: "NUM_DIGITS"
  - name: segment_sel_o
    direction: output
    width: 8

artifacts:
  synthesis:
    - ../rtl/segment/seven_seg_mux.sv
  simulation: []
  metadata: []

provides:
  modules:
    - seven_seg_mux
