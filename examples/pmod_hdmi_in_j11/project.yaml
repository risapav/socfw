version: 2
kind: project

project:
  name: pmod_hdmi_in_j11
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen

registries:
  packs:
    - ../../packs/builtin
  ip:
    - ip

features:
  use:
    - board:external.pmod.j11_hdmi_in.signals.clk
    - board:external.pmod.j11_hdmi_in.signals.de
    - board:external.pmod.j11_hdmi_in.signals.hsync
    - board:external.pmod.j11_hdmi_in.signals.vsync
    - board:external.pmod.j11_hdmi_in.signals.d

timing:
  file: timing.yaml

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: hdmi_in0
    type: hdmi_in
    clocks:
      PIXEL_CLK: sys_clk
    bind:
      ports:
        HDMI_IN_CLK:
          target: board:external.pmod.j11_hdmi_in.signals.clk
        HDMI_IN_DE:
          target: board:external.pmod.j11_hdmi_in.signals.de
        HDMI_IN_HSYNC:
          target: board:external.pmod.j11_hdmi_in.signals.hsync
        HDMI_IN_VSYNC:
          target: board:external.pmod.j11_hdmi_in.signals.vsync
        HDMI_IN_D:
          target: board:external.pmod.j11_hdmi_in.signals.d

artifacts:
  emit: [rtl, board, timing]
