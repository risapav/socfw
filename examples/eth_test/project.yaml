version: 2
kind: project

project:
  name: eth_test
  mode: standalone
  board: qmtech_ep4ce55
  debug: true

timing:
  file: timing_config.yaml

registries:
  packs:
    - ../../packs/builtin
  ip:
    - ip
    - cores/clkpll
  cpu: []

features:
  use:
    - board:onboard.eth
    - board:onboard.leds

board_overrides:
  board:onboard.eth.rx_clk_0:
    emit:
      pin_assignment: false
      io_assignments: false

clocks:
  primary:
    domain: eth_rx_clk
    source: board:onboard.eth.rx_clk
    frequency_hz: 125000000
  generated:
    - domain: eth_tx_clk
      source:
        instance: clkpll
        output: c0
      frequency_hz: 125000000
      reset:
        none: true

modules:
  - instance: clkpll
    type: clkpll
    clocks:
      inclk0:
        domain: sys_clk
        no_reset: true
    reset: "~RESET_N"

  - instance: ethernet_test
    type: ethernet_test
    clocks:
      eth_rx_clk_i: eth_rx_clk
      sys_clk_i: sys_clk
      eth_tx_clk_i: eth_tx_clk

    bind:
      ports:
        eth_mdc_o:
          target: board:onboard.eth.mdc
        eth_mdio_io:
          target: board:onboard.eth.mdio
        eth_rx_clk_i:
          target: board:onboard.eth.rx_clk
        eth_rx_dv_i:
          target: board:onboard.eth.rx_dv
        eth_rx_er_i:
          target: board:onboard.eth.rx_er
        eth_tx_en_o:
          target: board:onboard.eth.tx_en
        eth_tx_er_o:
          target: board:onboard.eth.tx_er
        eth_gtx_clk_o:
          target: board:onboard.eth.gtx_clk
        eth_rst_no:
          target: board:onboard.eth.reset
        eth_rx_data_i:
          target: board:onboard.eth.rxd
        eth_tx_data_o:
          target: board:onboard.eth.txd
        status_led_o:
          target: board:onboard.leds
          adapt: zero_extend

artifacts:
  emit: [rtl, board, timing]
