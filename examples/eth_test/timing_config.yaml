version: 2
kind: timing

timing:
  derive_uncertainty: true

  clocks:
    - name: ETH_RX_CLK
      source: ETH_RX_CLK
      period_ns: 8.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2
    - name: SYS_CLK
      source: SYS_CLK
      period_ns: 20.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2

  generated_clocks:
    - name: ETH_TX_CLK
      source:
        instance: clkpll
        output: c0
        # 125 MHz TX clock pre GMII GTX_CLK: 50 MHz * 5/2 = 125 MHz
      multiply_by: 5
      divide_by: 2

  clock_groups:
    - type: asynchronous
      groups:
        - [ETH_RX_CLK]
        - [ETH_TX_CLK]
        - [SYS_CLK]

  false_paths:
    - from_port: RESET_N
      comment: "Async reset path"
    - to_port: ETH_GTX_CLK
      comment: "GTX_CLK je PLL clock output pin — IO delay analyza neplatí"

  io_delays:
    auto: true
    default_clock: SYS_CLK
    default_input_max_ns: 3.0
    default_input_min_ns: 0.0
    default_output_max_ns: 3.0
    default_output_min_ns: 0.0
    overrides:
      - port: "ETH_RXD[*]"
        direction: input
        clock: ETH_RX_CLK
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RX data (PHY -> FPGA, RTL8211EG datasheet: setup>=2.5ns, hold>=0.5ns)"

      - port: ETH_RX_DV
        direction: input
        clock: ETH_RX_CLK
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RX data valid"

      - port: ETH_RX_ER
        direction: input
        clock: ETH_RX_CLK
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RX error"

      - port: "ETH_TXD[*]"
        direction: output
        clock: ETH_TX_CLK
        max_ns: 2.0
        min_ns: 0.0
        comment: "GMII TX data (FPGA -> PHY, RTL8211EG datasheet: setup>=2ns)"

      - port: ETH_TX_EN
        direction: output
        clock: ETH_TX_CLK
        max_ns: 2.0
        min_ns: 0.0
        comment: "GMII TX enable"

      - port: ETH_TX_ER
        direction: output
        clock: ETH_TX_CLK
        max_ns: 2.0
        min_ns: 0.0
        comment: "GMII TX error"
