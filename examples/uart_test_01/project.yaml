version: 2
kind: project

project:
  name: uart_test_01
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen
  debug: true

timing:
  file: timing_config.yaml

registries:
  ip:
    - ip
  cpu: []

features:
  use:
    - board:onboard.uart.rx
    - board:onboard.uart.tx
    - board:onboard.leds

clocks:
  primary:
    domain: sys_clk
    source: board:sys_clk
    frequency_hz: 50000000
  generated: []

modules:
  - instance: uart0
    type: uart
    params:
      CLK_FREQ_HZ: 50000000
      BAUD_RATE: 115200
      DATA_WIDTH: 8
      STOP2: false
      PARITY: "2'b00"
      DBITS: "2'b00"
    clocks:
      clk: sys_clk
    bind:
      ports:
        rx_i:
          target: board:onboard.uart.rx
        tx_o:
          target: board:onboard.uart.tx

  - instance: uart_loopback0
    type: uart_stream_loopback_status
    clocks:
      clk: sys_clk
    bind:
      ports:
        leds_o:
          target: board:onboard.leds

connections:
  - from: uart0.rx_data_o
    to: uart_loopback0.rx_data_i
  - from: uart0.rx_valid_o
    to: uart_loopback0.rx_valid_i
  - from: uart_loopback0.rx_ready_o
    to: uart0.rx_ready_i

  - from: uart_loopback0.tx_data_o
    to: uart0.tx_data_i
  - from: uart_loopback0.tx_valid_o
    to: uart0.tx_valid_i
  - from: uart0.tx_ready_o
    to: uart_loopback0.tx_ready_i

  - from: uart0.tx_busy_o
    to: uart_loopback0.tx_busy_i
  - from: uart0.rx_busy_o
    to: uart_loopback0.rx_busy_i
  - from: uart0.overrun_err_o
    to: uart_loopback0.overrun_err_i
  - from: uart0.frame_err_o
    to: uart_loopback0.frame_err_i
  - from: uart0.parity_err_o
    to: uart_loopback0.parity_err_i

artifacts:
  emit: [rtl, board, timing]