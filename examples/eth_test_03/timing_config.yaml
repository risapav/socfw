version: 2
kind: timing

timing:
  derive_uncertainty: true

  clocks:
    - name: ETH_RXC
      source: ETH_RXC
      period_ns: 8.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2
    - name: SYS_CLK
      source: SYS_CLK
      period_ns: 20.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2

  generated_clocks:
    - name: ETH_TX_CLK
      source:
        instance: clkpll
        output: c0
        # 125 MHz TX clock pre GMII GTX_CLK: 50 MHz * 5/2 = 125 MHz
      multiply_by: 5
      divide_by: 2

  clock_groups:
    - type: asynchronous
      groups:
        - [ETH_RXC]
        - [ETH_TX_CLK]
        - [SYS_CLK]

  false_paths:
    - from_port: RESET_N
      comment: "Async reset path"
    - to_port: ETH_GTX_CLK
      comment: "GTX_CLK je PLL clock output pin — IO delay analyza neplatí"
    - to_port: "ETH_TXD[*]"
      comment: "Source-synchronous TX: TXD a GTX_CLK z rovnakeho PLL, analyza cez interni ETH_TX_CLK je presne pesimisticka (skutocna marga ~4.7ns vs 2ns spec)"
    - to_port: ETH_TXEN
      comment: "Source-synchronous TX: rovnaka PLL hodina ako GTX_CLK"
    - to_port: ETH_TXER
      comment: "Source-synchronous TX: rovnaka PLL hodina ako GTX_CLK"
    - from_port: "ETH_RXD[*]"
      hold_only: true
      comment: "GLOBAL_SIGNAL na ETH_RXC: hold analyza pesimisticka (+4ns GCK insertion); setup analysis enabled to constrain IOE->first-FF routing"
    - from_port: ETH_RXDV
      hold_only: true
      comment: "GLOBAL_SIGNAL na ETH_RXC: hold artifact only"
    - from_port: ETH_RXER
      hold_only: true
      comment: "GLOBAL_SIGNAL na ETH_RXC: hold artifact only"

  io_delays:
    auto: true
    default_clock: SYS_CLK
    default_input_max_ns: 3.0
    default_input_min_ns: 0.0
    default_output_max_ns: 3.0
    default_output_min_ns: 0.0
    overrides:
      - port: "ETH_RXD[*]"
        direction: input
        clock: ETH_RXC
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RXD[7:0] (PHY->FPGA, RTL8211EG Table 58: setup>=2.5ns, hold>=0.5ns)"

      - port: ETH_RXDV
        direction: input
        clock: ETH_RXC
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RXDV (PHY->FPGA)"

      - port: ETH_RXER
        direction: input
        clock: ETH_RXC
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RXER (PHY->FPGA)"

