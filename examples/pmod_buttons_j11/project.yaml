version: 2
kind: project

project:
  name: pmod_buttons_j11
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen

registries:
  packs:
    - ../../packs/builtin
  ip:
    - ip

features:
  use:
    - board:external.pmod.j11_buttons8

timing:
  file: timing.yaml

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: btn_demo
    type: btn_demo
    clocks:
      SYS_CLK: sys_clk
    bind:
      ports:
        BUTTONS:
          target: board:external.pmod.j11_buttons8

artifacts:
  emit: [rtl, board, timing]
