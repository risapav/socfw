version: 2
kind: project

project:
  name: pmod_led_j10
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen

registries:
  packs:
    - ../../packs/builtin
  ip:
    - ip

features:
  use:
    - board:external.pmod.j10_led6

timing:
  file: timing.yaml

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: blink_01
    type: blink_test
    clocks:
      SYS_CLK: sys_clk
    params:
      CLK_FREQ: 50000000
    bind:
      ports:
        ONB_LEDS:
          target: board:external.pmod.j10_led6

artifacts:
  emit: [rtl, board, timing]
