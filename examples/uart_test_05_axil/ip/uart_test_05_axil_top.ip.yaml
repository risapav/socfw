version: 2
kind: ip

ip:
  name: uart_test_05_axil_top
  module: uart_test_05_axil_top
  category: demo

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: rst_ni
  active_high: false

clocking:
  primary_input_port: clk_i

params:
  CLK_FREQ_HZ:
    type: int
    default: 125000000
  BAUD_RATE:
    type: int
    default: 115200
  FIFO_DEPTH:
    type: int
    default: 64

ports:
  - name: pll_locked_i
    direction: input
    width: 1
  - name: uart_rx_i
    direction: input
    width: 1
  - name: uart_tx_o
    direction: output
    width: 1
  - name: led_o
    direction: output
    width: 6

artifacts:
  synthesis:
    - ../../../rtl/axi/axi_pkg.sv
    - ../../../rtl/axi/axi_interfaces.sv
    - ../../../rtl/uart/uart_pkg.sv
    - ../../../rtl/uart/uart_baud_gen.sv
    - ../../../rtl/uart/uart_core_rx.sv
    - ../../../rtl/uart/uart_core_rx_os.sv
    - ../../../rtl/uart/uart_core_tx.sv
    - ../../../rtl/uart/uart.sv
    - ../../../rtl/uart/uart_os.sv
    - ../../../rtl/uart/sync_fifo.sv
    - ../../../rtl/uart/uart_fifo.sv
    - ../../../rtl/uart/uart_fifo_os.sv
    - ../../../rtl/uart/uart_axil.sv
    - ../rtl/axil_uart_loopback.sv
    - ../rtl/uart_test_05_axil_top.sv

  simulation: []
  metadata: []

provides:
  modules:
    - uart_test_05_axil_top
    - axil_uart_loopback
    - uart_axil
    - uart_fifo_os
    - uart_fifo
    - sync_fifo
    - uart_baud_gen
    - uart_core_rx_os
    - uart_core_rx
    - uart_core_tx
    - uart_os
    - uart
  packages:
    - uart_pkg
    - axi_pkg
