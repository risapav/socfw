version: 2
kind: ip

ip:
  name: vga_hdmi_tx
  module: vga_hdmi_tx
  category: peripheral

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: rst_ni
  active_high: false

clocking:
  primary_input_port: clk_i
  additional_input_ports:
    - clk_x_i
  outputs: []

parameters:
  - name: ENABLE_DATA_ISLAND
    type: bit
    default: 0
  - name: ENABLE_AUDIO
    type: bit
    default: 0
  - name: ACR_N
    type: int
    default: 6144
  - name: ACR_CTS
    type: int
    default: 40000
  - name: ENABLE_GCP_PACKET
    type: bit
    default: 1
  - name: ENABLE_AVI_PACKET
    type: bit
    default: 1
  - name: ENABLE_ACR_PACKET
    type: bit
    default: 1
  - name: ENABLE_AUDIO_INFOFRAME
    type: bit
    default: 1
  - name: ENABLE_AUDIO_SAMPLE
    type: bit
    default: 1
  - name: GCP_FRAME_PERIOD
    type: int
    default: 1
  - name: VBLANK_ONLY
    type: bit
    default: 0
  - name: DEBUG_ISLAND_PHASES
    type: int
    default: 0

ports:
  - name: clk_i
    direction: input
    width: 1
  - name: clk_x_i
    direction: input
    width: 1
  - name: rst_ni
    direction: input
    width: 1
  - name: vga_r_i
    direction: input
    width: 5
  - name: vga_g_i
    direction: input
    width: 6
  - name: vga_b_i
    direction: input
    width: 5
  - name: vga_hs_i
    direction: input
    width: 1
  - name: vga_vs_i
    direction: input
    width: 1
  - name: vga_de_i
    direction: input
    width: 1
  - name: hblank_i
    direction: input
    width: 1
  - name: vblank_i
    direction: input
    width: 1
  - name: frame_start_i
    direction: input
    width: 1
  - name: line_start_i
    direction: input
    width: 1
  - name: blank_remaining_i
    direction: input
    width: 16
  - name: hdmi_p_o
    direction: output
    width: 4

artifacts:
  synthesis:
    - ../cores/ddio_out/ddio_out.qip
    - ../rtl/hdmi/hdmi_pkg.sv
    - ../rtl/video/video_pkg.sv
    - ../rtl/hdmi/acr_packet_builder.sv
    - ../rtl/hdmi/audio_sample_packet_builder.sv
    - ../rtl/hdmi/data_island_formatter.sv
    - ../rtl/hdmi/gcp_packet_builder.sv
    - ../rtl/hdmi/hdmi_audio_test_src.sv
    - ../rtl/hdmi/hdmi_bch_ecc.sv
    - ../rtl/hdmi/hdmi_channel_mux.sv
    - ../rtl/hdmi/hdmi_packet_arbiter.sv
    - ../rtl/hdmi/hdmi_period_scheduler.sv
    - ../rtl/hdmi/hdmi_tx_core.sv
    - ../rtl/hdmi/infoframe_builder.sv
    - ../rtl/hdmi/terc4_encoder.sv
    - ../rtl/hdmi/tmds_control_encoder.sv
    - ../rtl/hdmi/tmds_phy_ddr_aligned.sv
    - ../rtl/hdmi/tmds_video_encoder.sv
    - ../rtl/hdmi/vga_hdmi_tx.sv
  simulation: []
  metadata: []

provides:
  modules:
    - vga_hdmi_tx
