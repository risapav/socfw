version: 2
kind: timing

timing:
  derive_uncertainty: true

  clocks:
    - name: ETH_RXC
      source: ETH_RXC
      period_ns: 8.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2
    - name: SYS_CLK
      source: SYS_CLK
      period_ns: 20.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2

  generated_clocks:
    - name: CLK125
      source:
        instance: clkpll
        output: c0
        # 125 MHz: 50 MHz * 5/2
      multiply_by: 5
      divide_by: 2

  clock_groups:
    - type: asynchronous
      groups:
        - [ETH_RXC]
        - [CLK125]
        - [SYS_CLK]

  false_paths:
    - from_port: RESET_N
      comment: "Async reset path"
    - to_port: ETH_GTX_CLK
      comment: "GTX_CLK je PLL clock output pin"
    - to_port: "ETH_TXD[*]"
      comment: "Source-synchronous TX z rovnakeho PLL"
    - to_port: ETH_TXEN
      comment: "Source-synchronous TX"
    - to_port: ETH_TXER
      comment: "Source-synchronous TX"
    - from_port: "ETH_RXD[*]"
      hold_only: true
      comment: "GLOBAL_SIGNAL na ETH_RXC: hold analyza pesimisticka"
    - from_port: ETH_RXDV
      hold_only: true
      comment: "GLOBAL_SIGNAL na ETH_RXC"
    - from_port: ETH_RXER
      hold_only: true
      comment: "GLOBAL_SIGNAL na ETH_RXC"

  io_delays:
    auto: true
    default_clock: SYS_CLK
    default_input_max_ns: 3.0
    default_input_min_ns: 0.0
    default_output_max_ns: 3.0
    default_output_min_ns: 0.0
    overrides:
      - port: "ETH_RXD[*]"
        direction: input
        clock: ETH_RXC
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RXD[7:0] (RTL8211EG Table 58)"

      - port: ETH_RXDV
        direction: input
        clock: ETH_RXC
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RXDV"

      - port: ETH_RXER
        direction: input
        clock: ETH_RXC
        max_ns: 2.5
        min_ns: 0.5
        comment: "GMII RXER"

      - port: UART_RX
        direction: input
        clock: CLK125
        max_ns: 3.0
        min_ns: 0.0
        comment: "XFCP UART RX"

      - port: UART_TX
        direction: output
        clock: CLK125
        max_ns: 3.0
        min_ns: 0.0
        comment: "XFCP UART TX"
