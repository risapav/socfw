version: 2
kind: timing

timing:
  clocks:
    - name: sys_clk
      source: board:sys_clk
      period_ns: 20.0
      reset:
        source: board:sys_reset_n
        active_low: true
        sync_stages: 2

  io_delays:
    auto: true
    clock: sys_clk
    default_input_max_ns: 3.0
    default_output_max_ns: 3.0

  false_paths:
    - from_port: RESET_N
      comment: Async reset
