version: 2
kind: ip

ip:
  name: blink_test
  module: blink_test
  category: standalone

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: null
  active_high: false

clocking:
  primary_input_port: SYS_CLK
  additional_input_ports: []
  outputs: []

ports:
  - name: SYS_CLK
    direction: input
    width: 1
  - name: ONB_LEDS
    direction: output
    width: 5

artifacts:
  synthesis:
    - ../rtl/blink_test.sv
  simulation: []
  metadata: []
