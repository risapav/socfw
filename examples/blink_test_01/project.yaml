version: 2
kind: project
# DEMO: blink_test
# Minimal HW test - counter blink, no CPU, no bus
# Verifies: clock, reset, LED pins

project:
  name: blink_test_01
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen
  debug: true

timing:
  file: timing_config.yaml  

registries:
  packs: []
  ip:
    - ip

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK
    frequency_hz: 50000000
  generated: []    

modules:
  - instance: blink_test
    type: blink_test
    params:
      CLK_FREQ: 50000000
    clocks:
      clk_i: sys_clk
    bind:
      ports:
        leds_o:
          target: board:onboard.leds

artifacts:
  emit: [rtl, board, timing]
