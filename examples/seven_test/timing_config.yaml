version: 2
kind: timing

timing:
  derive_uncertainty: true

  clocks:
    - name: SYS_CLK
      source: SYS_CLK
      period_ns: 20.0
      reset:
        source: RESET_N
        active_low: true
        sync_stages: 2

  false_paths:
    - from_port: RESET_N
      comment: "Async reset path"

  io_delays:
    auto: true
    default_clock: SYS_CLK
    default_input_max_ns: 3.0
    default_input_min_ns: 0.0
    default_output_max_ns: 3.0
    default_output_min_ns: 0.0
    overrides:
      # Displej výstupy — relaxed timing (nízka frekvencia multiplexovania)
      - port: ONB_SEG
        direction: output
        clock: SYS_CLK
        max_ns: 8.0
        min_ns: 0.0
        comment: "Seven-segment cathode outputs — relaxed"

      - port: ONB_DIG
        direction: output
        clock: SYS_CLK
        max_ns: 8.0
        min_ns: 0.0
        comment: "Seven-segment digit select outputs — relaxed"
