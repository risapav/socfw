version: 2
kind: ip

ip:
  name: seven_seg_mux
  module: seven_seg_mux
  category: peripheral

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: rst_ni
  active_high: false

clocking:
  primary_input_port: clk_i
  additional_input_ports: []
  outputs: []

# POZOR: digits_i [NUM_DIGITS] a dots_i [NUM_DIGITS] sú UNPACKED ARRAYS.
# Framework ich nevie automaticky napojiť. Nie sú uvedené v ports:.
# Po generovaní ručne doplni do soc_top.sv napríklad:
#   .digits_i('{ 4'h0, 4'h0, 4'h0, 4'h0, 4'h0, 4'h0 }),
#   .dots_i('{ 0, 0, 0, 0, 0, 0 })
#
# current_digit_o: $clog2(NUM_DIGITS) = $clog2(6) = 3 bity, nepripojené.

ports:
  - name: clk_i
    direction: input
    width: 1
  - name: rst_ni
    direction: input
    width: 1
  - name: digit_sel_o
    direction: output
    width: 6
  - name: segment_sel_o
    direction: output
    width: 8

artifacts:
  synthesis:
    - ../rtl/segment/seven_seg_mux.sv
  simulation: []
  metadata: []

provides:
  modules:
    - seven_seg_mux
