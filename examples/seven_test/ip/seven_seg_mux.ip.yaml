version: 2
kind: ip

ip:
  name: seven_seg_mux
  module: seven_seg_mux_packed
  category: display

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: rst_ni
  active_high: false

clocking:
  primary_input_port: clk_i
  additional_input_ports: []
  outputs: []

parameters:
  - name: CLOCK_FREQ_HZ
    type: int
    default: 50000000
  - name: NUM_DIGITS
    type: int
    default: 3
  - name: DIGIT_REFRESH_HZ
    type: int
    default: 250
  - name: COMMON_ANODE
    type: bit
    default: true

ports:
  - name: clk_i
    direction: input
    width: 1

  - name: rst_ni
    direction: input
    width: 1

  - name: digits_i
    direction: input
    width_expr: "NUM_DIGITS*4"

  - name: dots_i
    direction: input
    width_expr: "NUM_DIGITS"

  - name: digit_sel_o
    direction: output
    width_expr: "NUM_DIGITS"

  - name: segment_sel_o
    direction: output
    width: 8

  - name: current_digit_o
    direction: output
    width_expr: "$clog2(NUM_DIGITS)"

artifacts:
  synthesis:
    - ../rtl/segment/seven_seg_mux.sv
    - ../rtl/segment/seven_seg_mux_packed.sv
  simulation: []
  metadata: []

provides:
  modules:
    - seven_seg_mux
    - seven_seg_mux_packed
