version: 2
kind: ip

ip:
  name: seven_seg_demo
  module: seven_seg_demo
  category: display

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: true
  dependency_only: false

reset:
  port: rst_ni
  active_high: false

clocking:
  primary_input_port: clk_i
  additional_input_ports: []
  outputs: []

parameters:
  - name: CLOCK_FREQ_HZ
    type: int
    default: 50000000
  - name: NUM_DIGITS
    type: int
    default: 3
  - name: TICK_HZ
    type: int
    default: 4

ports:
  - name: clk_i
    direction: input
    width: 1

  - name: rst_ni
    direction: input
    width: 1

  - name: digits_o
    direction: output
    width_expr: "NUM_DIGITS*4"

  - name: dots_o
    direction: output
    width_expr: "NUM_DIGITS"

artifacts:
  synthesis:
    - ../rtl/seven_seg_demo.sv
  simulation: []
  metadata: []

provides:
  modules:
    - seven_seg_demo
