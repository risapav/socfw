version: 2
kind: project

project:
  name: seven_test
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen
  debug: true

timing:
  file: timing_config.yaml

registries:
  packs: []
  ip:
    - ip

features:
  use:
    - board:onboard.seg
    - board:onboard.dig

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK
    frequency_hz: 50000000
  generated: []

modules:
  # Demo generátor: cykluje hex hodnoty 0-F na všetkých digitoch,
  # walking dot sa posúva každú sekundu
  - instance: demo0
    type: seven_seg_demo
    clocks:
      clk_i: sys_clk
    params:
      CLOCK_FREQ_HZ: 50000000
      NUM_DIGITS: 6
      TICK_HZ: 4

  # Seven-segment mux driver: riadi multiplexovaný displej
  - instance: seg_mux0
    type: seven_seg_mux
    clocks:
      clk_i: sys_clk
    params:
      CLOCK_FREQ_HZ: 50000000
      NUM_DIGITS: 6
      DIGIT_REFRESH_HZ: 500
      COMMON_ANODE: 0
    bind:
      ports:
        digit_sel_o:
          target: board:onboard.dig
        segment_sel_o:
          target: board:onboard.seg

# Prepojenie: demo výstupy → mux vstupy
connections:
  - from: demo0.digits_o
    to: seg_mux0.digits_i
  - from: demo0.dots_o
    to: seg_mux0.dots_i

artifacts:
  emit: [rtl, board, timing]
