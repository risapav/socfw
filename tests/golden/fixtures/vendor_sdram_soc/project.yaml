version: 2
kind: project

project:
  name: vendor_sdram_soc
  mode: soc
  board: qmtech_ep4ce55
  output_dir: build/gen
  debug: true

registries:
  packs:
    - ../../../../packs/vendor-intel
  ip:
    - ip

features:
  use:
    - board:onboard.leds

clocks:
  primary:
    domain: sys_clk
    source: board:sys_clk
  generated: []

cpu:
  instance: cpu0
  type: dummy_cpu
  fabric: main
  reset_vector: 0x00000000
  params: {}

ram:
  module: soc_ram
  base: 0x00000000
  size: 32768
  latency: registered
  init_file: ""
  image_format: hex

boot:
  reset_vector: 0x00000000
  stack_percent: 25

buses:
  - name: main
    protocol: simple_bus
    addr_width: 32
    data_width: 32

modules:
  - instance: sdram0
    type: sdram_ctrl
    bus:
      fabric: main
      base: 0x80000000
      size: 0x01000000
    clocks:
      clk: sys_clk
    bind:
      ports:
        zs_addr:
          target: board:onboard.sdram.addr
        zs_ba:
          target: board:onboard.sdram.ba
        zs_dq:
          target: board:onboard.sdram.dq
        zs_dqm:
          target: board:onboard.sdram.dqm
        zs_cs_n:
          target: board:onboard.sdram.cs_n
        zs_we_n:
          target: board:onboard.sdram.we_n
        zs_ras_n:
          target: board:onboard.sdram.ras_n
        zs_cas_n:
          target: board:onboard.sdram.cas_n
        zs_cke:
          target: board:onboard.sdram.cke
        zs_clk:
          target: board:onboard.sdram.clk

artifacts:
  emit: [rtl, timing, board, files, docs]
