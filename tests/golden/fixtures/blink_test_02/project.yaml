version: 2
kind: project

project:
  name: blink_test_02
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build

registries:
  ip:
    - ip

features:
  use:
    - board:onboard.leds

timing:
  file: timing.yaml

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK
  generated:
    - domain: clk_100mhz
      source:
        instance: clkpll
        output: c0
      reset:
        sync_from: sys_clk
        sync_stages: 2
    - domain: clk_100mhz_sh
      source:
        instance: clkpll
        output: c1
      reset:
        none: true

modules:
  - instance: clkpll
    type: clkpll
    clocks:
      inclk0: sys_clk

  - instance: blink_test
    type: blink_test
    clocks:
      clk: clk_100mhz
    bind:
      ports:
        gpio_o:
          target: board:onboard.leds

artifacts:
  emit: [rtl, board, timing]
