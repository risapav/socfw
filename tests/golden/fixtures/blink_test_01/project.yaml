version: 2
kind: project

project:
  name: blink_test_01
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build/gen

registries:
  ip:
    - ip

features:
  use:
    - board:onboard.leds

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: blink_test
    type: blink_test
    clocks:
      clk: sys_clk
    bind:
      ports:
        gpio_o:
          target: board:onboard.leds

timing:
  file: timing.yaml

artifacts:
  emit: [rtl, board, timing]
