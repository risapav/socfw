version: 2
kind: timing

timing:
  derive_uncertainty: true

  clocks:
    - name: sys_clk
      source: board:sys_clk
      period_ns: 20.0
      reset:
        source: board:sys_reset_n
        active_low: true
        sync_stages: 2

  false_paths:
    - from_port: RESET_N
      comment: Async reset

  io_delays:
    auto: true
    default_output_max_ns: 3.0
    default_output_min_ns: 0.0
