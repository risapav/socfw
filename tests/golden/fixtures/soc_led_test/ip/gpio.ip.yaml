version: 2
kind: ip

ip:
  name: gpio
  module: gpio0_shell
  category: peripheral

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: true
  generate_registers: true
  instantiate_directly: true
  dependency_only: false

reset:
  port: RESET_N
  active_high: false

clocking:
  primary_input_port: SYS_CLK
  additional_input_ports: []
  outputs: []

artifacts:
  synthesis:
    - ../rtl/gpio_core.sv
  simulation: []
  metadata: []

registers:
  - name: value
    offset: 0
    width: 32
    access: rw
    reset: 0
    desc: GPIO output value

  - name: irq_pending
    offset: 4
    width: 1
    access: rw
    reset: 0
    set_by_hw: true
    clear_on_write: true
    desc: IRQ pending flag

irqs:
  - name: changed
    id: 0

shell:
  module: gpio_core
  external_ports:
    - name: gpio_o
      direction: output
      width: 6
  core_ports:
    - kind: reg
      reg_name: value
      port_name: reg_value

    - kind: status
      signal_name: irq_pending
      port_name: irq_pending

    - kind: irq
      signal_name: irq_changed
      port_name: irq_changed

    - kind: external
      signal_name: gpio_o
      port_name: gpio_o
