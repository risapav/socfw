version: 2
kind: ip

ip:
  name: gpio
  module: gpio
  category: peripheral

origin:
  kind: source
  packaging: plain_rtl

integration:
  needs_bus: true
  generate_registers: true
  instantiate_directly: true
  dependency_only: false

reset:
  port: RESET_N
  active_high: false

clocking:
  primary_input_port: SYS_CLK
  additional_input_ports: []
  outputs: []

artifacts:
  synthesis:
    - tests/golden/fixtures/soc_led_test/rtl/gpio.sv
    - tests/golden/fixtures/soc_led_test/rtl/gpio_core.sv
  simulation: []
  metadata: []

registers:
  - name: value
    offset: 0
    width: 32
    access: rw
    reset: 0
    desc: GPIO output value

irqs:
  - name: changed
    id: 0
