version: 2
kind: project

project:
  name: blink_converged
  mode: standalone
  board: qmtech_ep4ce55
  output_dir: build

registries:
  ip:
    - ip

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: blink_test
    type: blink_test
    params:
      CLK_FREQ: 50000000
    clocks:
      SYS_CLK: sys_clk
    bind:
      ports:
        ONB_LEDS:
          target: board:onboard.leds

artifacts:
  emit: [rtl, board]
