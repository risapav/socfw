version: 2
kind: ip

ip:
  name: sdram_fifo
  module: sdram_fifo
  category: memory

origin:
  kind: vendor_generated
  tool: quartus
  packaging: qip

integration:
  needs_bus: false
  generate_registers: false
  instantiate_directly: false
  dependency_only: true

reset:
  port: aclr
  active_high: true
  bypass_sync: true
  asynchronous: true

clocking:
  primary_input_port: rdclk
  additional_input_ports:
    - wrclk

artifacts:
  synthesis:
    - sdram_fifo.qip
  simulation:
    - sdram_fifo.v
    - sdram_fifo_bb.v
