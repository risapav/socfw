version: 2
kind: ip

name: sdram_fifo
module: sdram_fifo
category: memory

origin:
  kind: vendor_generated
  tool: quartus
  packaging: qip

integration:
  bus: none
  generate_registers: false
  instantiate: false
  dependency_only: true

reset:
  port: aclr
  active_high: true
  bypass_sync: true
  asynchronous: true

clocking:
  primary_input: rdclk
  additional_inputs:
    - wrclk

artifacts:
  synthesis:
    - sdram_fifo.qip
  simulation:
    - sdram_fifo.v
    - sdram_fifo_bb.v
