version: 2
kind: ip

name: uart
module: uart
category: peripheral

origin:
  kind: source

integration:
  bus: slave
  generate_registers: true
  instantiate: true
  dependency_only: false

reset:
  port: rst_n
  active_high: false
  bypass_sync: false

clocking:
  primary_input: clk

bus_interfaces:
  - port_name: bus
    protocol: simple_bus
    role: slave
    addr_width: 12
    data_width: 32

artifacts:
  synthesis:
    - uart.sv

params:
  baud_default: 115200
