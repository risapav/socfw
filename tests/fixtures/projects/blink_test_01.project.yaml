version: 2
kind: project

project:
  name: blink_test_01
  mode: standalone
  board: qmtech_ep4ce55
  board_file: ../boards/qmtech_ep4ce55.board.yaml
  output_dir: build
  debug: true

registries:
  ip:
    - ../ip

features:
  use:
    - board:onboard.leds

clocks:
  primary:
    domain: sys_clk
    source: board:SYS_CLK

modules:
  - instance: blink_test
    type: uart
    clocks:
      clk: sys_clk
    bind:
      ports:
        gpio_o:
          target: board:onboard.leds

artifacts:
  emit: [rtl, board, docs]
