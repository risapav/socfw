version: 2
kind: board

board:
  id: qmtech_ep4ce55
  vendor: QMTech
  title: QMTech EP4CE55F23C8

fpga:
  family: "Cyclone IV E"
  part: EP4CE55F23C8
  package: FBGA
  pins: 484
  speed: 8
  hdl_default: SystemVerilog_2005

system:
  clock:
    id: sys_clk
    top_name: SYS_CLK
    pin: T2
    io_standard: "3.3-V LVTTL"
    frequency_hz: 50000000
    period_ns: 20.0

  reset:
    id: sys_reset_n
    top_name: RESET_N
    pin: W13
    io_standard: "3.3-V LVTTL"
    active_low: true

resources:
  onboard:

    vga:
      top_name: VGA
      direction: output
      groups:
        vga_r:
          top_name: VGA_R
          direction: output
          io_standard: "3.3-V LVTTL"
          width: 5
          pins: [N20, B21, M20, N19, M19]
        vga_g:
          top_name: VGA_G
          direction: output
          io_standard: "3.3-V LVTTL"
          width: 6
          pins: [D22, E21, C22, D21, C21, B22]
        vga_b:
          top_name: VGA_B
          direction: output
          io_standard: "3.3-V LVTTL"
          width: 5
          pins: [H21, H22, F21, F22, E22]
      signals:
        vga_hsync:
          direction: output
          top_name: VGA_HS
          pin: J21
          io_standard: "3.3-V LVTTL"
        vga_vsync:
          direction: output
          top_name: VGA_VS
          pin: J22
          io_standard: "3.3-V LVTTL"

    leds:
      top_name: ONB_LEDS
      direction: output
      width: 6
      io_standard: "3.3-V LVTTL"
      pins: [E4, A8, B8, A7, B7, A6]

    seg:
      top_name: ONB_SEG
      direction: output
      width: 8
      io_standard: "3.3-V LVTTL"
      pins: [C4, B2, A3, C3, A5, B4, B1, A4]  # Original pin order (a,b,c,d,e,f,g,dp)  [7:0] = [A4, B1, B4, A5, C3, A3, B2, C4]

    dig:
      top_name: ONB_DIG
      direction: output
      width: 3
      io_standard: "3.3-V LVTTL"
      pins: [B5, B3, B6]

    buttons:
      top_name: ONB_BTN
      direction: input
      width: 4
      io_standard: "3.3-V LVTTL"
      pins: [U13, V13, U14, V14]

    uart:
      io_standard: "3.3-V LVTTL"
      signals:
        rx:
          top_name: UART_RX
          direction: input
          pin: J2
          io_standard: "3.3-V LVTTL"
        tx:
          top_name: UART_TX
          direction: output
          pin: J1
          io_standard: "3.3-V LVTTL"

    sdram:
      io_standard: "3.3-V SSTL-2 Class I"
      groups:
        addr:
          top_name: SDRAM_ADDR
          direction: output
          width: 13
          pins: [T6, R6, R5, P5, P6, V7, V6, U7, U6, N6, N8, P7, P8]
        dq:
          top_name: SDRAM_DQ
          direction: inout
          width: 16
          pins: [T10, T9, V10, V9, U9, U8, T8, T7, P3, P4, R2, R1, R4, R3, T5, T4]
        ba:
          top_name: SDRAM_BA
          direction: output
          width: 2
          pins: [N9, P9]
        dqm:
          top_name: SDRAM_DQM
          direction: output
          width: 2
          pins: [V11, R0]
      signals:
        cas_n:
          top_name: SDRAM_CAS_N
          direction: output
          pin: U1
        ras_n:
          top_name: SDRAM_RAS_N
          direction: output
          pin: U2
        we_n:
          top_name: SDRAM_WE_N
          direction: output
          pin: V1
        cs_n:
          top_name: SDRAM_CS_N
          direction: output
          pin: V2
        cke:
          top_name: SDRAM_CKE
          direction: output
          pin: V3
        clk:
          top_name: SDRAM_CLK
          direction: output
          pin: V4

  external:
    sdram:
      addr:
        kind: vector
        top_name: ZS_ADDR
        width: 13
        pins: [T6, R6, R5, P5, P6, V7, V6, U7, U6, N6, N8, P7, P8]
      ba:
        kind: vector
        top_name: ZS_BA
        width: 2
        pins: [N9, P9]
      dq:
        kind: inout
        top_name: ZS_DQ
        width: 16
        pins: [T10, T9, V10, V9, U9, U8, T8, T7, P3, P4, R2, R1, R4, R3, T5, T4]
      dqm:
        kind: vector
        top_name: ZS_DQM
        width: 2
        pins: [V11, R0]
      cs_n:
        kind: scalar
        top_name: ZS_CS_N
        pin: V2
      we_n:
        kind: scalar
        top_name: ZS_WE_N
        pin: V1
      ras_n:
        kind: scalar
        top_name: ZS_RAS_N
        pin: U2
      cas_n:
        kind: scalar
        top_name: ZS_CAS_N
        pin: U1
      cke:
        kind: scalar
        top_name: ZS_CKE
        pin: V3
      clk:
        kind: scalar
        top_name: ZS_CLK
        pin: V4

    pmod:
      j10_led6:
        kind: vector
        top_name: PMOD_J10_LED
        direction: output
        width: 6
        io_standard: "3.3-V LVTTL"
        connector: connectors.pmod.J10
        pins: [H1, F1, E1, C1, H2, F2]
      j10_led8:
        kind: vector
        top_name: PMOD_J10_LED8
        direction: output
        width: 8
        io_standard: "3.3-V LVTTL"
        connector: connectors.pmod.J10
        pins: [H1, F1, E1, C1, H2, F2, D2, C2]
      j11_led6:
        kind: vector
        top_name: PMOD_J11_LED
        direction: output
        width: 6
        io_standard: "3.3-V LVTTL"
        connector: connectors.pmod.J11
        pins: [R1, P1, N1, M1, R2, P2]
      j11_led8:
        kind: vector
        top_name: PMOD_J11_LED8
        direction: output
        width: 8
        io_standard: "3.3-V LVTTL"
        connector: connectors.pmod.J11
        pins: [R1, P1, N1, M1, R2, P2, N2, M2]
      j10_buttons8:
        kind: vector
        top_name: PMOD_J10_BTN
        direction: input
        width: 8
        io_standard: "3.3-V LVTTL"
        connector: connectors.pmod.J10
        pins: [H1, F1, E1, C1, H2, F2, D2, C2]
      j11_buttons8:
        kind: vector
        top_name: PMOD_J11_BTN
        direction: input
        width: 8
        io_standard: "3.3-V LVTTL"
        connector: connectors.pmod.J11
        pins: [R1, P1, N1, M1, R2, P2, N2, M2]
      j10_hdmi_out:
        kind: bundle
        connector: connectors.pmod.J10
        io_standard: "3.3-V LVTTL"
        signals:
          clk:
            kind: scalar
            top_name: HDMI_CLK
            direction: output
            pin: H1
          de:
            kind: scalar
            top_name: HDMI_DE
            direction: output
            pin: F1
          hsync:
            kind: scalar
            top_name: HDMI_HSYNC
            direction: output
            pin: E1
          vsync:
            kind: scalar
            top_name: HDMI_VSYNC
            direction: output
            pin: C1
          d:
            kind: vector
            top_name: HDMI_D
            direction: output
            width: 4
            pins: [H2, F2, D2, C2]
      j11_hdmi_in:
        kind: bundle
        connector: connectors.pmod.J11
        io_standard: "3.3-V LVTTL"
        signals:
          clk:
            kind: scalar
            top_name: HDMI_IN_CLK
            direction: input
            pin: R1
          de:
            kind: scalar
            top_name: HDMI_IN_DE
            direction: input
            pin: P1
          hsync:
            kind: scalar
            top_name: HDMI_IN_HSYNC
            direction: input
            pin: N1
          vsync:
            kind: scalar
            top_name: HDMI_IN_VSYNC
            direction: input
            pin: M1
          d:
            kind: vector
            top_name: HDMI_IN_D
            direction: input
            width: 4
            pins: [R2, P2, N2, M2]

  connectors:
    pmod:
      J10:
        pins:
          1: H1
          2: F1
          3: E1
          4: C1
          7: H2
          8: F2
          9: D2
          10: C2
      J11:
        pins:
          1: R1
          2: P1
          3: N1
          4: M1
          7: R2
          8: P2
          9: N2
          10: M2
